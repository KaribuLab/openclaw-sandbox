services:
  webtop:
    build: ./sandbox
    container_name: openclaw-webtop
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SETGID
      - SETUID
      - CHOWN
      - DAC_OVERRIDE
    # Toda la config vive en .env y se pasa COMPLETA al contenedor (env_file).
    # Asi agregas o quitas claves OPENCLAW_AUTH_CHOICE / OPENCLAW_CFG__* /
    # OPENCLAW_ENV__* sin tocar este archivo.
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config:/config
    ports:
      - "3300:3000"   # webtop noVNC (KasmVNC)
      - "3301:3001"   # webtop secure noVNC (HTTPS)
    restart: unless-stopped