services:
  sandbox:
    build:
      context: ./sandbox
      args:
        LOCALE: ${LOCALE}
        TZ: ${TZ}
    container_name: openclaw-sandbox
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_TIME
    ports:
      - "6080:6080"
    environment:
      - VNC_RESOLUTION=${VNC_RESOLUTION}
      - VNC_PASSWORD=${VNC_PASSWORD}
      - OPENCLAW_HOME=/home/agent/.openclaw
    volumes:
      - openclaw-data:/home/agent/.openclaw
      - playwright-data:/home/agent/.playwright
      - cache-data:/home/agent/.cache
      - nvm-data:/home/agent/.nvm
      - npm-data:/home/agent/.npm
      - config-data:/home/agent/.config
volumes:
  openclaw-data:
  playwright-data:
  cache-data:
  nvm-data:
  npm-data:
  config-data: