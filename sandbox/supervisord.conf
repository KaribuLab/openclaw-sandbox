[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:chrony]
command=/usr/sbin/chronyd -x -n -f /etc/chrony/chrony.conf
autostart=true
autorestart=true
priority=1
startretries=0
stdout_logfile=/var/log/supervisor/chrony.log
stderr_logfile=/var/log/supervisor/chrony.err.log

[program:xvfb]
command=/usr/bin/Xvfb :0 -screen 0 %(ENV_VNC_RESOLUTION)sx24 -ac +extension GLX +render -noreset
autostart=true
autorestart=true
priority=10
environment=DISPLAY=:0
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb.err.log

[program:xfce]
command=/bin/bash -c "export HOME=/home/agent && export XDG_RUNTIME_DIR=/run/user/1000 && dbus-launch --exit-with-session startxfce4"
autostart=true
autorestart=true
priority=20
environment=DISPLAY=:0
stdout_logfile=/var/log/supervisor/xfce.log
stderr_logfile=/var/log/supervisor/xfce.err.log

[program:vncserver]
command=/usr/bin/x11vnc -display :0 -forever -shared -rfbport 5901 -rfbauth /home/agent/.vnc/passwd
autostart=true
autorestart=true
priority=30
environment=DISPLAY=:0
killasgroup=true
stopasgroup=true
stdout_logfile=/var/log/supervisor/vnc.log
stderr_logfile=/var/log/supervisor/vnc.err.log

[program:novnc]
command=/usr/bin/websockify --web /opt/novnc/www 6080 localhost:5901
autostart=true
autorestart=true
priority=40
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc.err.log
