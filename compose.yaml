services:
  sandbox:
    build:
      context: ./sandbox
      args:
        LOCALE: ${LOCALE}
        TZ: ${TZ}
    container_name: openclaw-sandbox
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_TIME
    ports:
      - "6080:6080"
    environment:
      - VNC_RESOLUTION=${VNC_RESOLUTION}
      - VNC_PASSWORD=${VNC_PASSWORD}
